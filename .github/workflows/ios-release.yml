name: iOS App Store (Capacitor + fastlane)

# 로컬 Xcode/맥 없이 GitHub의 macOS 러너(클라우드)에서 빌드·서명·업로드한다.
# 수동 실행(workflow_dispatch)만 — 아무 때나 자동 배포되지 않는다.
# 서명은 App Store Connect API Key(.p8) 기반 automatic signing(-allowProvisioningUpdates).
# 비밀값은 전부 GitHub Secrets에서 주입(레포/코드에 키 없음).

on:
  workflow_dispatch:
    inputs:
      lane:
        description: "fastlane lane"
        default: "beta"        # beta = TestFlight 업로드(스크린샷 불필요, 첫 목표)
        type: choice
        options:
          - beta               # 빌드 → TestFlight (대표가 아이폰에서 실기기 확인)
          - release            # 빌드 → App Store Connect 업로드(메타데이터, 심사 제출은 수동)

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 40
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # App Store는 iOS 26 SDK(Xcode 26+)로 빌드한 앱만 받는다.
      # 러너에 설치된 Xcode 중 가장 최신 버전을 선택하고, 실제 SDK 버전을 로그에 남긴다.
      - name: Select newest Xcode (iOS 26 SDK required by App Store)
        run: |
          set -e
          echo "설치된 Xcode 목록:"
          ls -d /Applications/Xcode*.app || true
          latest=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$latest" ]; then latest="/Applications/Xcode.app"; fi
          echo "선택한 Xcode: $latest"
          sudo xcode-select -s "$latest/Contents/Developer"
          xcodebuild -version
          echo "iOS SDK 버전: $(xcrun --sdk iphoneos --show-sdk-version)"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install JS deps
        run: npm install

      - name: Generate iOS project (Capacitor)
        run: |
          npx cap add ios || echo "ios already present"
          npx cap sync ios

      # 수출 규정(암호화) 신고: 이 앱은 개인용 로컬 기록 도구로 표준 암호화(HTTPS) 외
      # 별도 암호화를 쓰지 않아 면제 대상이다. Info.plist에 미리 박아두면 업로드마다
      # TestFlight가 암호화 질문을 묻지 않아 대표가 매번 답할 필요가 없다.
      # (ios 프로젝트는 CI에서 매번 새로 생성되므로 sync 직후 주입한다.)
      - name: Declare export compliance (no non-exempt encryption)
        run: |
          PLIST="ios/App/App/Info.plist"
          /usr/libexec/PlistBuddy -c "Add :ITSAppUsesNonExemptEncryption bool false" "$PLIST" \
            || /usr/libexec/PlistBuddy -c "Set :ITSAppUsesNonExemptEncryption false" "$PLIST"
          /usr/libexec/PlistBuddy -c "Print :ITSAppUsesNonExemptEncryption" "$PLIST"

      - name: Setup Ruby (fastlane)
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"

      - name: Install fastlane
        run: gem install fastlane -NV

      - name: Write ASC API key (.p8) from secret
        run: |
          mkdir -p "${{ github.workspace }}/fastlane"
          printf '%s' "${ASC_API_KEY_P8}" > "${{ github.workspace }}/fastlane/asc_api_key.p8"
        env:
          ASC_API_KEY_P8: ${{ secrets.ASC_API_KEY_P8 }}

      - name: Run fastlane (${{ github.event.inputs.lane }})
        run: fastlane ios "${{ github.event.inputs.lane }}"
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          # 절대경로로 준다 — fastlane 실행 CWD가 fastlane/ 폴더라
          # 상대경로면 fastlane/fastlane/... 로 이중 결합돼 파일을 못 찾는다.
          ASC_API_KEY_PATH: ${{ github.workspace }}/fastlane/asc_api_key.p8
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APP_IDENTIFIER: com.workpaytracker.app
